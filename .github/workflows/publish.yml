name: Publish Aether

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-aether-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false"
    steps:
      - name: Require a main-branch release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]] || {
            echo "::error::Publishing is allowed only from refs/heads/main (received $GITHUB_REF)."
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Grant execute permissions
        run: |
          chmod +x gradlew
          if [ -f sign-artifact.sh ]; then
            chmod +x sign-artifact.sh
          fi

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: e2e-tests/package-lock.json

      - name: Cache Gradle and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/nodejs
            ~/.gradle/yarn
            build
            */build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties', 'gradle/libs.versions.toml', '**/gradle.lockfile', 'settings-gradle.lockfile', 'gradle/verification-metadata.xml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify version matches tag
        id: version
        shell: bash
        run: |
          VERSION=$(grep "^VERSION=" version.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" != "v$VERSION" ]]; then
              echo "::error::Tag $TAG does not match version v$VERSION from version.properties"
              exit 1
            fi
          fi

      - name: Install locked browser-test dependencies
        run: npm ci --prefix e2e-tests

      - name: Verify browser-test contracts and types
        run: |
          npm test --prefix e2e-tests
          npm run typecheck --prefix e2e-tests

      - name: Install Playwright browsers
        run: npm exec --prefix e2e-tests -- playwright install --with-deps chromium firefox webkit

      - name: Expose Playwright Chromium to Kotlin browser tests
        shell: bash
        run: |
          node -e "const fs=require('fs'); const {chromium}=require('./e2e-tests/node_modules/@playwright/test'); fs.appendFileSync(process.env.GITHUB_ENV, 'CHROME_BIN='+chromium.executablePath()+'\n')"

      - name: Run tests
        shell: bash
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES"
            if ./gradlew verifyExpectedSourceTasks check -x wasmJsBrowserTest --dependency-verification=strict --no-daemon --stacktrace; then
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Build failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done
          echo "Build failed after $MAX_RETRIES attempts"
          exit 1

      - name: Install the official Firestore emulator
        uses: google-github-actions/setup-gcloud@v3.0.1
        with:
          version: '570.0.0'
          install_components: cloud-firestore-emulator

      - name: Run the real Firestore REST transaction gate
        env:
          AETHER_FIRESTORE_EMULATOR_PROJECT_ID: aether-identity-emulator-${{ github.run_id }}-${{ github.run_attempt }}
        run: ./aether-auth-firestore/run-emulator-gate.sh

      - name: Run Kotlin browser tests
        run: |
          ./gradlew :aether-auth-summon:wasmJsBrowserTest :example-app:wasmJsBrowserTest --dependency-verification=strict --no-daemon --stacktrace

      - name: Run Chromium, Firefox, and WebKit identity UI tests
        run: npm run test:browser --prefix e2e-tests

      - name: Run disposable passkey and recovery journeys
        env:
          AETHER_E2E_LIVE_IDENTITY: '1'
          AETHER_E2E_EPHEMERAL: '1'
          AETHER_E2E_RECOVERY_FLOW: '1'
          PLAYWRIGHT_NO_COPY_PROMPT: '1'
          AETHER_E2E_BASE_URL: http://localhost:8080
          AETHER_IDENTITY_BOOTSTRAP_SECRET: aether-ci-disposable-bootstrap-secret
        run: npm run test:release --prefix e2e-tests

      - name: Delete sensitive live-journey output
        if: always()
        run: rm -rf e2e-tests/.live-sensitive-results

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: identity-browser-failures
          path: |
            e2e-tests/test-results
            e2e-tests/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify OpenSSL WASI host library primitives
        shell: bash
        run: |
          cmake -S aether-identity-wasi-host -B build/identity-wasi-host -DCMAKE_BUILD_TYPE=Release
          cmake --build build/identity-wasi-host --config Release --parallel 2
          ctest --test-dir build/identity-wasi-host --output-on-failure

  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: verify
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false"
    steps:
      - name: Require a main-branch release
        shell: bash
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]] || {
            echo "::error::Publishing is allowed only from refs/heads/main (received $GITHUB_REF)."
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Grant execute permissions
        run: |
          chmod +x gradlew
          if [ -f sign-artifact.sh ]; then
            chmod +x sign-artifact.sh
          fi

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Read release version and publication state
        id: version
        shell: bash
        run: |
          VERSION=$(grep "^VERSION=" version.properties | cut -d'=' -f2)
          [[ -n "$VERSION" ]] || { echo "::error::version.properties has no VERSION"; exit 1; }
          CHANGELOG_VERSION=$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | head -n 1)
          [[ "$CHANGELOG_VERSION" == "$VERSION" ]] || {
            echo "::error::The first CHANGELOG.md release ($CHANGELOG_VERSION) does not match version.properties ($VERSION)."
            exit 1
          }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify --quiet "refs/tags/v${VERSION}" >/dev/null; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release tag v${VERSION} already exists; publication is already complete."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure publishing secrets are present
        if: steps.version.outputs.tag_exists != 'true'
        shell: bash
        run: |
          [[ -n "${{ secrets.CENTRAL_USERNAME }}" ]] || { echo "::error::Missing required secret CENTRAL_USERNAME"; exit 1; }
          [[ -n "${{ secrets.CENTRAL_PASSWORD }}" ]] || { echo "::error::Missing required secret CENTRAL_PASSWORD"; exit 1; }
          [[ -n "${{ secrets.CENTRAL_SIGNING_PASSWORD }}" ]] || { echo "::error::Missing required secret CENTRAL_SIGNING_PASSWORD"; exit 1; }
          [[ -n "${{ secrets.CENTRAL_SIGNING_KEY_ASC }}" ]] || { echo "::error::Missing required secret CENTRAL_SIGNING_KEY_ASC"; exit 1; }

      - name: Configure publishing credentials
        if: steps.version.outputs.tag_exists != 'true'
        shell: bash
        run: |
          cat <<'EOF' > local.properties
          mavenCentralUsername=${{ secrets.CENTRAL_USERNAME }}
          mavenCentralPassword=${{ secrets.CENTRAL_PASSWORD }}
          signingPassword=${{ secrets.CENTRAL_SIGNING_PASSWORD }}
          EOF

          SIGNING_SECRET="${{ secrets.CENTRAL_SIGNING_KEY_ASC }}"
          if [[ -z "$SIGNING_SECRET" ]]; then
            echo "::error::CENTRAL_SIGNING_KEY_ASC secret is not set"
            exit 1
          fi

          if echo "$SIGNING_SECRET" | base64 -d > private-key.asc 2>/tmp/base64-decode.log; then
            echo "Imported signing key from base64-encoded secret"
          else
            echo "$SIGNING_SECRET" > private-key.asc
            echo "Stored signing key as literal ASCII-armored block"
          fi

          chmod 600 private-key.asc

          TMP_GNUPGHOME=$(mktemp -d)
          export GNUPGHOME="$TMP_GNUPGHOME"
          if ! gpg --batch --yes --import private-key.asc >/tmp/gpg-import.log 2>&1; then
            echo "::error::Signing key could not be imported"
            cat /tmp/gpg-import.log || true
            rm -rf "$TMP_GNUPGHOME"
            exit 1
          fi
          rm -rf "$TMP_GNUPGHOME"

      - name: Publish Aether to Maven Central
        if: steps.version.outputs.tag_exists != 'true'
        shell: bash
        run: |
          MAVEN_REPO="$RUNNER_TEMP/aether-release-m2-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$MAVEN_REPO"
          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES"
            if ./gradlew -Dmaven.repo.local="$MAVEN_REPO" publishToCentralPortalManually --no-daemon --stacktrace --info; then
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Publish failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done
          echo "Publish failed after $MAX_RETRIES attempts"
          exit 1

      - name: Extract latest changelog entry
        id: changelog
        shell: bash
        run: |
          python3 <<'PY'
          try:
              with open("CHANGELOG.md", encoding="utf-8") as fh:
                  lines = fh.readlines()
          except FileNotFoundError:
              print("No CHANGELOG.md found")
              exit(0)

          section = []
          capture = False
          for line in lines:
              if line.startswith("## ["):
                  if capture:
                      break
                  capture = True
                  continue
              if capture:
                  section.append(line.rstrip("\n"))

          notes = "\n".join(section).strip()
          print(notes)
          with open("release-notes.md", "w", encoding="utf-8") as out:
              out.write(notes + "\n")
          PY

          if [ -f release-notes.md ]; then
            NOTES=$(cat release-notes.md)
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "notes=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push release tag
        if: steps.version.outputs.tag_exists != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping."
          else
            git tag -a "v${VERSION}" -m "Aether ${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: steps.changelog.outputs.notes != ''
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Aether ${{ steps.version.outputs.version }}
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Publish Aether

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      retry_failed_deployment_id:
        description: Exact FAILED Central deployment UUID authorizing a corrected same-version upload
        required: false
        type: string
      resume_deployment_id:
        description: Existing non-failed Central deployment UUID to resume polling without another upload
        required: false
        type: string
      resume_commit_sha:
        description: Exact 40-character commit SHA encoded in the resumed deployment name
        required: false
        type: string
      repair_release_tag:
        description: Move an existing unpublished release tag to the exact corrected publication commit
        required: false
        default: false
        type: boolean
      acknowledge_unavailable_failed_deployment:
        description: Acknowledge the reviewed one-time recovery when Central no longer exposes the failed deployment
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-aether-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false"
    steps:
      - name: Require a main-branch release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]] || {
            echo "::error::Publishing is allowed only from refs/heads/main (received $GITHUB_REF)."
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Grant execute permissions
        run: |
          chmod +x gradlew
          if [ -f sign-artifact.sh ]; then
            chmod +x sign-artifact.sh
          fi

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: e2e-tests/package-lock.json

      - name: Cache Gradle and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/nodejs
            ~/.gradle/yarn
            build
            */build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties', 'gradle/libs.versions.toml', '**/gradle.lockfile', 'settings-gradle.lockfile', 'gradle/verification-metadata.xml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify version matches tag
        id: version
        shell: bash
        run: |
          VERSION=$(grep "^VERSION=" version.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" != "v$VERSION" ]]; then
              echo "::error::Tag $TAG does not match version v$VERSION from version.properties"
              exit 1
            fi
          fi

      - name: Install locked browser-test dependencies
        run: npm ci --prefix e2e-tests

      - name: Verify browser-test contracts and types
        run: |
          npm test --prefix e2e-tests
          npm run typecheck --prefix e2e-tests

      - name: Install Playwright browsers
        run: npm exec --prefix e2e-tests -- playwright install --with-deps chromium firefox webkit

      - name: Expose Playwright Chromium to Kotlin browser tests
        shell: bash
        run: |
          node -e "const fs=require('fs'); const {chromium}=require('./e2e-tests/node_modules/@playwright/test'); fs.appendFileSync(process.env.GITHUB_ENV, 'CHROME_BIN='+chromium.executablePath()+'\n')"

      - name: Run tests
        shell: bash
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES"
            MAVEN_REPO="$RUNNER_TEMP/aether-verify-m2-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${i}"
            rm -rf "$MAVEN_REPO"
            mkdir -p "$MAVEN_REPO"
            if ./gradlew -Dmaven.repo.local="$MAVEN_REPO" verifyExpectedSourceTasks verifyCentralPublicationArtifacts check -x wasmJsBrowserTest --dependency-verification=strict --no-daemon --stacktrace; then
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Build failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done
          echo "Build failed after $MAX_RETRIES attempts"
          exit 1

      - name: Install the official Firestore emulator
        uses: google-github-actions/setup-gcloud@v3.0.1
        with:
          version: '570.0.0'
          install_components: cloud-firestore-emulator

      - name: Run the real Firestore REST transaction gate
        env:
          AETHER_FIRESTORE_EMULATOR_PROJECT_ID: aether-identity-emulator-${{ github.run_id }}-${{ github.run_attempt }}
        run: ./aether-auth-firestore/run-emulator-gate.sh

      - name: Run Kotlin browser tests
        run: |
          ./gradlew :aether-auth-summon:wasmJsBrowserTest :example-app:wasmJsBrowserTest --dependency-verification=strict --no-daemon --stacktrace

      - name: Run Chromium, Firefox, and WebKit identity UI tests
        run: npm run test:browser --prefix e2e-tests

      - name: Run disposable passkey and recovery journeys
        env:
          AETHER_E2E_LIVE_IDENTITY: '1'
          AETHER_E2E_EPHEMERAL: '1'
          AETHER_E2E_RECOVERY_FLOW: '1'
          PLAYWRIGHT_NO_COPY_PROMPT: '1'
          AETHER_E2E_BASE_URL: http://localhost:8080
          AETHER_IDENTITY_BOOTSTRAP_SECRET: aether-ci-disposable-bootstrap-secret
        run: npm run test:release --prefix e2e-tests

      - name: Delete sensitive live-journey output
        if: always()
        run: rm -rf e2e-tests/.live-sensitive-results

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: identity-browser-failures
          path: |
            e2e-tests/test-results
            e2e-tests/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify OpenSSL WASI host library primitives
        shell: bash
        run: |
          cmake -S aether-identity-wasi-host -B build/identity-wasi-host -DCMAKE_BUILD_TYPE=Release
          cmake --build build/identity-wasi-host --config Release --parallel 2
          ctest --test-dir build/identity-wasi-host --output-on-failure

  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: verify
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false"
    steps:
      - name: Require a main-branch release
        shell: bash
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]] || {
            echo "::error::Publishing is allowed only from refs/heads/main (received $GITHUB_REF)."
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Grant execute permissions
        run: |
          chmod +x gradlew
          if [ -f sign-artifact.sh ]; then
            chmod +x sign-artifact.sh
          fi

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Read release version and publication state
        id: version
        shell: bash
        env:
          RETRY_FAILED_DEPLOYMENT_ID: ${{ inputs.retry_failed_deployment_id || '' }}
          RESUME_DEPLOYMENT_ID: ${{ inputs.resume_deployment_id || '' }}
          RESUME_COMMIT_SHA: ${{ inputs.resume_commit_sha || '' }}
          REPAIR_RELEASE_TAG: ${{ inputs.repair_release_tag || false }}
          ACKNOWLEDGE_UNAVAILABLE_FAILED_DEPLOYMENT: ${{ inputs.acknowledge_unavailable_failed_deployment || false }}
        run: |
          VERSION=$(grep "^VERSION=" version.properties | cut -d'=' -f2)
          [[ -n "$VERSION" ]] || { echo "::error::version.properties has no VERSION"; exit 1; }
          CHANGELOG_VERSION=$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | head -n 1)
          [[ "$CHANGELOG_VERSION" == "$VERSION" ]] || {
            echo "::error::The first CHANGELOG.md release ($CHANGELOG_VERSION) does not match version.properties ($VERSION)."
            exit 1
          }
          WORKFLOW_COMMIT=$(git rev-parse HEAD)
          RELEASE_COMMIT="$WORKFLOW_COMMIT"

          if [[ -n "$RETRY_FAILED_DEPLOYMENT_ID" && -n "$RESUME_DEPLOYMENT_ID" ]]; then
            echo "::error::retry_failed_deployment_id and resume_deployment_id are mutually exclusive"
            exit 1
          fi
          if [[ "$ACKNOWLEDGE_UNAVAILABLE_FAILED_DEPLOYMENT" == "true" && -z "$RETRY_FAILED_DEPLOYMENT_ID" ]]; then
            echo "::error::acknowledge_unavailable_failed_deployment is valid only with retry_failed_deployment_id"
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -z "$RETRY_FAILED_DEPLOYMENT_ID" && -z "$RESUME_DEPLOYMENT_ID" ]]; then
            echo "::error::Manual publication is recovery-only; provide a failed retry ID or an exact resume ID."
            exit 1
          fi
          for DEPLOYMENT_ID in "$RETRY_FAILED_DEPLOYMENT_ID" "$RESUME_DEPLOYMENT_ID"; do
            if [[ -n "$DEPLOYMENT_ID" && ! "$DEPLOYMENT_ID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
              echo "::error::Central deployment IDs must be UUIDs"
              exit 1
            fi
          done
          if [[ -n "$RESUME_DEPLOYMENT_ID" ]]; then
            [[ "$RESUME_COMMIT_SHA" =~ ^[0-9a-fA-F]{40}$ ]] || {
              echo "::error::resume_commit_sha must be the exact 40-character upload commit"
              exit 1
            }
            git cat-file -e "${RESUME_COMMIT_SHA}^{commit}" || {
              echo "::error::resume_commit_sha is not an available commit"
              exit 1
            }
            RESUME_VERSION=$(git show "${RESUME_COMMIT_SHA}:version.properties" | sed -n 's/^VERSION=//p')
            [[ "$RESUME_VERSION" == "$VERSION" ]] || {
              echo "::error::The current release version does not match the resumed upload commit"
              exit 1
            }
            RELEASE_COMMIT=$(git rev-parse "${RESUME_COMMIT_SHA}^{commit}")
          elif [[ -n "$RESUME_COMMIT_SHA" ]]; then
            echo "::error::resume_commit_sha is valid only with resume_deployment_id"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "workflow_commit=$WORKFLOW_COMMIT" >> "$GITHUB_OUTPUT"
          echo "release_commit=$RELEASE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "deployment_name=aether-${VERSION}-${RELEASE_COMMIT}" >> "$GITHUB_OUTPUT"

          if git rev-parse --verify --quiet "refs/tags/v${VERSION}" >/dev/null; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            TAG_EXISTS=true
            TAG_COMMIT=$(git rev-list -n 1 "v${VERSION}")
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            TAG_EXISTS=false
            TAG_COMMIT=""
          fi
          TAG_NEEDS_REPAIR=false
          UPLOAD_REQUIRED=false

          if [[ -n "$RETRY_FAILED_DEPLOYMENT_ID" ]]; then
            git fetch --no-tags origin main
            git merge-base --is-ancestor "$RELEASE_COMMIT" origin/main || {
              echo "::error::The failed-deployment retry commit is not contained in origin/main."
              exit 1
            }
            [[ "$TAG_EXISTS" == "true" ]] || {
              echo "::error::A failed-deployment retry is only allowed for an existing release tag."
              exit 1
            }
            git merge-base --is-ancestor "v${VERSION}" HEAD || {
              echo "::error::Existing tag v${VERSION} is not an ancestor of the repair commit."
              exit 1
            }
            if [[ "$TAG_COMMIT" != "$RELEASE_COMMIT" ]]; then
              [[ "$REPAIR_RELEASE_TAG" == "true" ]] || {
                echo "::error::The corrected bundle differs from v${VERSION}; explicitly enable repair_release_tag."
                exit 1
              }
              TAG_NEEDS_REPAIR=true
            fi
            UPLOAD_REQUIRED=true
            echo "publish_required=true" >> "$GITHUB_OUTPUT"
            echo "upload_required=true" >> "$GITHUB_OUTPUT"
            echo "release_mode=retry_failed" >> "$GITHUB_OUTPUT"
          elif [[ -n "$RESUME_DEPLOYMENT_ID" ]]; then
            git fetch --no-tags origin main
            git merge-base --is-ancestor "$RELEASE_COMMIT" origin/main || {
              echo "::error::The resumed release commit is not contained in origin/main."
              exit 1
            }
            if [[ "$TAG_EXISTS" == "true" ]]; then
              git merge-base --is-ancestor "v${VERSION}" "$RELEASE_COMMIT" || {
                echo "::error::Existing tag v${VERSION} is not an ancestor of the repair commit."
                exit 1
              }
              if [[ "$TAG_COMMIT" != "$RELEASE_COMMIT" ]]; then
                [[ "$REPAIR_RELEASE_TAG" == "true" ]] || {
                  echo "::error::Resume would change v${VERSION}; explicitly enable repair_release_tag."
                  exit 1
                }
                TAG_NEEDS_REPAIR=true
              fi
            fi
            echo "publish_required=true" >> "$GITHUB_OUTPUT"
            echo "upload_required=false" >> "$GITHUB_OUTPUT"
            echo "release_mode=resume" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_EXISTS" == "true" ]]; then
            git merge-base --is-ancestor "v${VERSION}" HEAD || {
              echo "::error::Existing tag v${VERSION} is not an ancestor of the current main commit."
              exit 1
            }
            [[ "$REPAIR_RELEASE_TAG" == "false" ]] || {
              echo "::error::repair_release_tag is valid only for retry or resume recovery."
              exit 1
            }
            echo "publish_required=false" >> "$GITHUB_OUTPUT"
            echo "upload_required=false" >> "$GITHUB_OUTPUT"
            echo "release_mode=existing" >> "$GITHUB_OUTPUT"
            echo "Release tag v${VERSION} already exists; Central upload is skipped."
          else
            [[ "$REPAIR_RELEASE_TAG" == "false" ]] || {
              echo "::error::repair_release_tag requires an existing release tag."
              exit 1
            }
            UPLOAD_REQUIRED=true
            echo "publish_required=true" >> "$GITHUB_OUTPUT"
            echo "upload_required=true" >> "$GITHUB_OUTPUT"
            echo "release_mode=new" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$TAG_NEEDS_REPAIR" == "true" ]]; then
            UNEXPECTED_REPAIR_FILES=()
            while IFS= read -r FILE; do
              case "$FILE" in
                .github/workflows/publish.yml|CHANGELOG.md|aether-plugin/build.gradle.kts|build.gradle.kts|docs/identity/deployment.md|e2e-tests/tests/config/scaffold.test.mjs|sign-artifact.sh)
                  ;;
                *)
                  UNEXPECTED_REPAIR_FILES+=("$FILE")
                  ;;
              esac
            done < <(git diff --name-only "v${VERSION}"..."${RELEASE_COMMIT}")
            if (( ${#UNEXPECTED_REPAIR_FILES[@]} > 0 )); then
              echo "::error::Same-version recovery is restricted to reviewed publication metadata; unexpected files: ${UNEXPECTED_REPAIR_FILES[*]}"
              exit 1
            fi
          fi
          echo "tag_needs_repair=$TAG_NEEDS_REPAIR" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_RUN_ATTEMPT" != "1" && "$UPLOAD_REQUIRED" == "true" ]]; then
            echo "::error::A rerun may duplicate an accepted Central upload. Start a fresh dispatch or resume an exact deployment ID."
            exit 1
          fi

      - name: Ensure Central credentials are present
        if: steps.version.outputs.publish_required == 'true'
        shell: bash
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          [[ -n "$CENTRAL_USERNAME" ]] || { echo "::error::Missing required secret CENTRAL_USERNAME"; exit 1; }
          [[ -n "$CENTRAL_PASSWORD" ]] || { echo "::error::Missing required secret CENTRAL_PASSWORD"; exit 1; }

      - name: Configure signing key
        if: steps.version.outputs.upload_required == 'true'
        shell: bash
        env:
          CENTRAL_SIGNING_PASSWORD: ${{ secrets.CENTRAL_SIGNING_PASSWORD }}
          CENTRAL_SIGNING_KEY_ASC: ${{ secrets.CENTRAL_SIGNING_KEY_ASC }}
        run: |
          [[ -n "$CENTRAL_SIGNING_PASSWORD" ]] || { echo "::error::Missing required secret CENTRAL_SIGNING_PASSWORD"; exit 1; }
          [[ -n "$CENTRAL_SIGNING_KEY_ASC" ]] || { echo "::error::Missing required secret CENTRAL_SIGNING_KEY_ASC"; exit 1; }
          if printf '%s' "$CENTRAL_SIGNING_KEY_ASC" | base64 --decode > private-key.asc 2>/tmp/base64-decode.log; then
            echo "Imported signing key from base64-encoded secret"
          else
            printf '%s\n' "$CENTRAL_SIGNING_KEY_ASC" > private-key.asc
            echo "Stored signing key as literal ASCII-armored block"
          fi

          chmod 600 private-key.asc

          TMP_GNUPGHOME=$(mktemp -d)
          export GNUPGHOME="$TMP_GNUPGHOME"
          if ! gpg --batch --yes --import private-key.asc >/tmp/gpg-import.log 2>&1; then
            echo "::error::Signing key could not be imported"
            cat /tmp/gpg-import.log || true
            rm -rf "$TMP_GNUPGHOME"
            exit 1
          fi
          rm -rf "$TMP_GNUPGHOME"

      - name: Validate Central recovery request
        id: central_recovery
        if: >-
          steps.version.outputs.publish_required == 'true' &&
          (inputs.retry_failed_deployment_id != '' || inputs.resume_deployment_id != '')
        shell: bash
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          EXPECTED_DEPLOYMENT_NAME: ${{ steps.version.outputs.deployment_name }}
          RETRY_FAILED_DEPLOYMENT_ID: ${{ inputs.retry_failed_deployment_id || '' }}
          RESUME_DEPLOYMENT_ID: ${{ inputs.resume_deployment_id || '' }}
          RELEASE_COMMIT: ${{ steps.version.outputs.release_commit }}
          TAG_NEEDS_REPAIR: ${{ steps.version.outputs.tag_needs_repair }}
          REPAIR_RELEASE_TAG: ${{ inputs.repair_release_tag || false }}
          ACKNOWLEDGE_UNAVAILABLE_FAILED_DEPLOYMENT: ${{ inputs.acknowledge_unavailable_failed_deployment || false }}
        run: |
          ./gradlew writeExpectedCentralPurls writeExpectedCentralReportedPurls --no-daemon --quiet
          DEPLOYMENT_ID="${RETRY_FAILED_DEPLOYMENT_ID:-$RESUME_DEPLOYMENT_ID}"
          export DEPLOYMENT_ID
          AUTHORIZATION="Bearer $(printf '%s' "$CENTRAL_USERNAME:$CENTRAL_PASSWORD" | base64 | tr -d '\n\r')"
          STATUS_FILE="$RUNNER_TEMP/central-recovery-status.json"
          set +e
          HTTP_CODE=$(curl --request POST \
            --url "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}" \
            --header "Authorization: ${AUTHORIZATION}" \
            --connect-timeout 10 --max-time 30 \
            --output "$STATUS_FILE" --write-out '%{http_code}' \
            --silent --show-error)
          CURL_EXIT=$?
          set -e
          if [[ "$CURL_EXIT" != "0" ]]; then
            echo "::error::Central recovery status request failed before receiving a definitive HTTP response"
            exit 1
          fi
          echo "claim_retry_deployment=false" >> "$GITHUB_OUTPUT"

          if [[ "$HTTP_CODE" == "200" ]]; then
            STATUS_JSON=$(<"$STATUS_FILE")
            export STATUS_JSON
            python3 <<'PY'
          import json
          import os
          import sys

          data = json.loads(os.environ["STATUS_JSON"])
          deployment_id = os.environ["DEPLOYMENT_ID"]
          retry_id = os.environ.get("RETRY_FAILED_DEPLOYMENT_ID", "")
          expected_name = os.environ["EXPECTED_DEPLOYMENT_NAME"]
          state = data.get("deploymentState")
          purls = data.get("purls") or []
          with open("build/central-expected-purls.txt", encoding="utf-8") as source:
              expected_purls = {line.strip() for line in source if line.strip()}
          with open("build/central-expected-reported-purls.txt", encoding="utf-8") as source:
              expected_reported_purls = {line.strip() for line in source if line.strip()}

          if data.get("deploymentId") != deployment_id:
              sys.exit("Central status response did not match the requested deployment")
          if not retry_id and data.get("deploymentName") != expected_name:
              sys.exit("resumed deployment name is not bound to the requested release commit")

          if retry_id:
              if state != "FAILED":
                  sys.exit(f"retry deployment must be FAILED, received {state!r}")
          elif state not in {"PENDING", "VALIDATING", "VALIDATED", "PUBLISHING", "PUBLISHED"}:
              sys.exit(f"resume deployment is not resumable, received {state!r}")

          if len(purls) != len(set(purls)):
              sys.exit("deployment contains duplicate component PURLs")
          if len(expected_purls) != 75 or len(expected_reported_purls) != 111:
              sys.exit("expected release manifests must contain exactly 75 coordinates and 111 reported PURLs")
          actual_purls = set(purls)
          unexpected_purls = actual_purls - expected_reported_purls
          if unexpected_purls:
              sys.exit(f"deployment contains unexpected component PURLs: {sorted(unexpected_purls)}")
          require_complete_manifest = bool(retry_id) or state == "PUBLISHED"
          if require_complete_manifest and actual_purls != expected_reported_purls:
              missing = sorted(expected_reported_purls - actual_purls)
              unexpected = sorted(actual_purls - expected_reported_purls)
              sys.exit(f"deployment component mismatch; missing={missing}, unexpected={unexpected}")
          print(f"Central recovery request verified: {data.get('deploymentId')} is {state}")
          PY
          elif [[ "$HTTP_CODE" == "404" ]]; then
            KNOWN_DEPLOYMENT_ID="e4df03ff-971d-4b12-b5cb-da68bbefa81a"
            KNOWN_VERSION="0.6.0.0"
            KNOWN_OLD_TAG_OBJECT="dc46b140797264f8bcd6378df3c00dbd42e7421f"
            KNOWN_OLD_TAG_COMMIT="f55c5a2c14dc444ffe09d0c09a857ea8421dd7ad"
            REVIEWED_REPAIR_BASELINE="582adbe30a4791f59547abff2c5e9ed9c8b0fd7e"

            [[ -n "$RETRY_FAILED_DEPLOYMENT_ID" ]] || {
              echo "::error::An unavailable deployment cannot be resumed"
              exit 1
            }
            [[ "$ACKNOWLEDGE_UNAVAILABLE_FAILED_DEPLOYMENT" == "true" ]] || {
              echo "::error::The reviewed unavailable-deployment recovery requires explicit acknowledgement"
              exit 1
            }
            [[ "$DEPLOYMENT_ID" == "$KNOWN_DEPLOYMENT_ID" && "$RELEASE_VERSION" == "$KNOWN_VERSION" ]] || {
              echo "::error::HTTP 404 is accepted only for the reviewed 0.6.0.0 failed deployment"
              exit 1
            }
            [[ "$TAG_NEEDS_REPAIR" == "true" && "$REPAIR_RELEASE_TAG" == "true" ]] || {
              echo "::error::The reviewed unavailable-deployment recovery must repair the unpublished release tag"
              exit 1
            }
            [[ "$(git rev-parse "refs/tags/v${RELEASE_VERSION}")" == "$KNOWN_OLD_TAG_OBJECT" ]] || {
              echo "::error::The release tag is no longer the reviewed unpublished tag object"
              exit 1
            }
            [[ "$(git rev-list -n 1 "v${RELEASE_VERSION}")" == "$KNOWN_OLD_TAG_COMMIT" ]] || {
              echo "::error::The release tag no longer targets the reviewed unpublished commit"
              exit 1
            }
            git merge-base --is-ancestor "$REVIEWED_REPAIR_BASELINE" "$RELEASE_COMMIT" || {
              echo "::error::The unavailable-deployment recovery does not contain the reviewed source-archive repair"
              exit 1
            }
            UNEXPECTED_POST_REVIEW_FILES=()
            while IFS= read -r FILE; do
              case "$FILE" in
                .github/workflows/publish.yml|CHANGELOG.md|docs/identity/deployment.md|e2e-tests/tests/config/scaffold.test.mjs)
                  ;;
                *)
                  UNEXPECTED_POST_REVIEW_FILES+=("$FILE")
                  ;;
              esac
            done < <(git diff --name-only "${REVIEWED_REPAIR_BASELINE}"..."${RELEASE_COMMIT}")
            if (( ${#UNEXPECTED_POST_REVIEW_FILES[@]} > 0 )); then
              echo "::error::Unreviewed files changed after the source-archive repair: ${UNEXPECTED_POST_REVIEW_FILES[*]}"
              exit 1
            fi
            echo "::notice::Central no longer exposes the reviewed failed deployment; authorizing one claimed replacement upload"
          else
            echo "::error::Central recovery status returned unexpected HTTP ${HTTP_CODE}"
            exit 1
          fi

          if [[ -n "$RETRY_FAILED_DEPLOYMENT_ID" ]]; then
            CHECKED_PURLS=0
            while IFS= read -r PURL; do
              [[ -n "$PURL" ]] || continue
              COORDINATE="${PURL#pkg:maven/}"
              PURL_VERSION="${COORDINATE##*@}"
              GROUP_AND_ARTIFACT="${COORDINATE%@*}"
              GROUP_ID="${GROUP_AND_ARTIFACT%/*}"
              ARTIFACT_ID="${GROUP_AND_ARTIFACT##*/}"
              [[ "$PURL_VERSION" == "$RELEASE_VERSION" && "$GROUP_ID" != "$GROUP_AND_ARTIFACT" ]] || {
                echo "::error::Malformed expected release PURL: ${PURL}"
                exit 1
              }
              GROUP_PATH="${GROUP_ID//./\/}"
              PUBLIC_POM="https://repo.maven.apache.org/maven2/${GROUP_PATH}/${ARTIFACT_ID}/${PURL_VERSION}/${ARTIFACT_ID}-${PURL_VERSION}.pom"
              PUBLIC_HTTP_CODE=$(curl --head --silent --show-error --output /dev/null --write-out '%{http_code}' \
                --header 'Cache-Control: no-cache' \
                --connect-timeout 10 --max-time 30 \
                "${PUBLIC_POM}?aether_recovery=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}")
              case "$PUBLIC_HTTP_CODE" in
                404) ;;
                200) echo "::error::${PURL} is already public and cannot be replaced"; exit 1 ;;
                *) echo "::error::Could not prove ${PURL} is unpublished (HTTP ${PUBLIC_HTTP_CODE})"; exit 1 ;;
              esac
              CHECKED_PURLS=$((CHECKED_PURLS + 1))
            done < build/central-expected-purls.txt
            [[ "$CHECKED_PURLS" == "75" ]] || {
              echo "::error::Expected to prove 75 coordinates unpublished, checked ${CHECKED_PURLS}"
              exit 1
            }
            echo "claim_retry_deployment=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Claim the one-time failed-deployment retry
        if: steps.central_recovery.outputs.claim_retry_deployment == 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_COMMIT: ${{ steps.version.outputs.release_commit }}
          RETRY_FAILED_DEPLOYMENT_ID: ${{ inputs.retry_failed_deployment_id || '' }}
        run: |
          CLAIM_TAG="central-retry-v${RELEASE_VERSION}-${RETRY_FAILED_DEPLOYMENT_ID}"
          CLAIM_REF="refs/tags/${CLAIM_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$CLAIM_TAG" "$RELEASE_COMMIT" \
            --message "Aether Central retry claim from run ${GITHUB_RUN_ID}, attempt ${GITHUB_RUN_ATTEMPT}"
          git push --force-with-lease="${CLAIM_REF}:" origin "$CLAIM_REF"
          echo "Claimed ${CLAIM_REF}; any interrupted run must resume the newly accepted deployment instead of uploading again."

      - name: Upload one Aether bundle to Maven Central
        id: central_upload
        if: steps.version.outputs.upload_required == 'true'
        shell: bash
        env:
          mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          signingPassword: ${{ secrets.CENTRAL_SIGNING_PASSWORD }}
          AETHER_CENTRAL_DEPLOYMENT_NAME: ${{ steps.version.outputs.deployment_name }}
        run: |
          MAVEN_REPO="$RUNNER_TEMP/aether-release-m2-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$MAVEN_REPO"
          ./gradlew -Dmaven.repo.local="$MAVEN_REPO" uploadCentralPortalBundle --no-daemon --stacktrace
          DEPLOYMENT_ID=$(tr -d '\n\r' < build/central-portal-deployment-id.txt)
          [[ "$DEPLOYMENT_ID" =~ ^[0-9a-fA-F-]{36}$ ]] || { echo "::error::Central deployment ID was not recorded"; exit 1; }
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for Maven Central publication
        if: steps.version.outputs.publish_required == 'true'
        shell: bash
        env:
          mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          AETHER_CENTRAL_DEPLOYMENT_ID: ${{ inputs.resume_deployment_id || steps.central_upload.outputs.deployment_id }}
          AETHER_CENTRAL_DEPLOYMENT_NAME: ${{ steps.version.outputs.deployment_name }}
        run: |
          ./gradlew waitForCentralPortalPublication --no-daemon --stacktrace

      - name: Delete publishing credentials
        if: always()
        shell: bash
        run: rm -f private-key.asc local.properties

      - name: Extract latest changelog entry
        id: changelog
        shell: bash
        env:
          RELEASE_COMMIT: ${{ steps.version.outputs.release_commit }}
        run: |
          RELEASE_CHANGELOG="$RUNNER_TEMP/release-changelog.md"
          git show "${RELEASE_COMMIT}:CHANGELOG.md" > "$RELEASE_CHANGELOG"
          export RELEASE_CHANGELOG
          python3 <<'PY'
          import os

          try:
              with open(os.environ["RELEASE_CHANGELOG"], encoding="utf-8") as fh:
                  lines = fh.readlines()
          except FileNotFoundError:
              print("No CHANGELOG.md found")
              exit(0)

          section = []
          capture = False
          for line in lines:
              if line.startswith("## ["):
                  if capture:
                      break
                  capture = True
                  continue
              if capture:
                  section.append(line.rstrip("\n"))

          notes = "\n".join(section).strip()
          print(notes)
          with open("release-notes.md", "w", encoding="utf-8") as out:
              out.write(notes + "\n")
          PY

          if [ -f release-notes.md ]; then
            NOTES=$(cat release-notes.md)
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "notes=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or repair the release tag
        if: steps.version.outputs.publish_required == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_COMMIT="${{ steps.version.outputs.release_commit }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ "${{ steps.version.outputs.tag_needs_repair }}" == "true" ]]; then
            OLD_TAG_OBJECT=$(git rev-parse "refs/tags/v${VERSION}")
            git tag --force --annotate "v${VERSION}" "$RELEASE_COMMIT" --message "Aether ${VERSION}"
            git push --force-with-lease="refs/tags/v${VERSION}:${OLD_TAG_OBJECT}" origin "refs/tags/v${VERSION}"
          elif git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            [[ "$(git rev-list -n 1 "v${VERSION}")" == "$RELEASE_COMMIT" ]] || {
              echo "::error::Existing release tag does not match the published commit"
              exit 1
            }
          else
            git tag --annotate "v${VERSION}" "$RELEASE_COMMIT" --message "Aether ${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: steps.version.outputs.publish_required == 'true' && steps.changelog.outputs.notes != ''
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Aether ${{ steps.version.outputs.version }}
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
